  <title>YAHA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #050505;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', Courier, monospace;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .cat-img {
      width: 140px;
      height: 140px;
      border-radius: 24px;
      object-fit: cover;
      object-position: center 8%;
      border: 1px solid rgba(0,212,255,0.3);
      box-shadow: 0 0 40px rgba(0,212,255,0.2), 0 0 80px rgba(168,85,247,0.1);
      display: block;
    }
    .wordmark {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 0.25em;
      color: #00d4ff;
      text-shadow: 0 0 24px rgba(0,212,255,0.7), 0 0 48px rgba(0,212,255,0.3);
    }
    .tagline {
      font-size: 8px;
      letter-spacing: 0.35em;
      color: #a855f7;
      opacity: 0.85;
      text-shadow: 0 0 10px rgba(168,85,247,0.5);
      margin-top: -12px;
    }
    .bar-track {
      width: 120px;
      height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #00d4ff, #a855f7);
      animation: load 2.4s ease-in-out infinite;
    }
    @keyframes load {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(0%); }
      100% { transform: translateX(200%); }
    }
  </style>
