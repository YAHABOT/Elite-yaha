<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YAHA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #050505;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(0,212,255,0.25), rgba(168,85,247,0.15));
      border: 1px solid rgba(0,212,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(0,212,255,0.15);
    }
    .logo svg { width: 32px; height: 32px; }
    .wordmark {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.4em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }
    .bar-track {
      width: 120px;
      height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #00d4ff, #a855f7);
      animation: load 2.4s ease-in-out infinite;
    }
    @keyframes load {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(0%); }
      100% { transform: translateX(200%); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 10 L16 22 L26 10" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M11 10 L16 16 L21 10" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
      </svg>
    </div>
    <span class="wordmark">YAHA</span>
    <div class="bar-track"><div class="bar-fill"></div></div>
  </div>
  <script>
    // Call /api/warmup to wake the serverless function, then navigate.
    // Show the splash for at least 1.2s regardless of warmup speed.
    var startTime = Date.now();
    var MIN_SHOW_MS = 1200;
    function go() {
      var elapsed = Date.now() - startTime;
      var wait = Math.max(0, MIN_SHOW_MS - elapsed);
      setTimeout(function() { window.location.replace('/dashboard'); }, wait);
    }
    fetch('/api/warmup').then(go).catch(go);
  </script>
</body>
</html>
